<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד מנהל</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede8;--t1:#1a1a18;--t2:#5f5e5a;--t3:#888780;--bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);--r:8px;--rl:12px}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg2);color:var(--t1);direction:rtl;min-height:100vh;padding:1.5rem 1rem}
.shell{max-width:1100px;margin:0 auto}
.db-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.db-title{font-size:20px;font-weight:600;color:var(--t1);margin-left:auto;display:flex;align-items:center;gap:8px}
.grade-btns{display:flex;gap:5px}
.gb{font-size:12px;padding:5px 13px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--bg);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s}
.gb:hover{background:var(--bg3)}
.gb.on{background:#185FA5;color:#E6F1FB;border-color:#185FA5}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1rem}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.ld{width:9px;height:9px;border-radius:2px}
.panels{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:14px;align-items:start}
@media(max-width:700px){.panels{grid-template-columns:1fr}}
.panel{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1rem 1.25rem}
.panel-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.panel-title i{font-size:16px;color:var(--t2)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav-label{font-size:13px;font-weight:600;color:var(--t1)}
.cal-nav-btn{background:none;border:0.5px solid var(--bd);border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--t2);font-size:15px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.cal-nav-btn:hover{background:var(--bg3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px}
.cal-dh{text-align:center;font-size:10px;color:var(--t3);padding:3px 0 6px}
.cal-cell{min-height:62px;border-radius:6px;border:0.5px solid var(--bd);padding:3px 4px;background:var(--bg);cursor:pointer;transition:border-color .15s}
.cal-cell:hover{border-color:var(--bd2)}
.cal-cell.ct{border-color:#185FA5;border-width:1.5px}
.cal-cell.sh{background:var(--bg3)}
.cal-cell.em{background:transparent;border-color:transparent;cursor:default}
.cal-dn{font-size:11px;font-weight:600;color:var(--t2);line-height:1}
.cal-cell.ct .cal-dn{color:#185FA5}
.cal-hd{font-size:9px;color:var(--t3);margin-bottom:3px;line-height:1}
.ec{font-size:9px;padding:1px 3px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.ec-x{background:#FAECE7;color:#993C1D}
.ec-e{background:#E1F5EE;color:#0F6E56}
.ec-h{background:#FAEEDA;color:#854F0B}
.ec-t{background:#E6F1FB;color:#185FA5}
.ec-b{background:#EEEDFE;color:#3C3489}
.more-c{font-size:9px;color:var(--t3);display:block}
.tl{display:flex;flex-direction:column;gap:4px}
.tl-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--bd);background:var(--bg);font-size:12px}
.tl-row.exam{border-right:3px solid #D85A30}
.tl-row.event{border-right:3px solid #1D9E75}
.tl-row.holiday{border-right:3px solid #BA7517}
.tl-row.trip{border-right:3px solid #378ADD}
.tl-row.bday{border-right:3px solid #7F77DD}
.tl-title{flex:1;color:var(--t1)}
.tl-date{font-size:11px;color:var(--t3);white-space:nowrap}
.tl-grade{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--t2);white-space:nowrap}
.gs-controls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.gs-controls select,.gs-controls input{font-size:12px;padding:5px 8px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--bg);color:var(--t1);font-family:inherit}
.gs-controls input{width:130px}
.avg-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--bd)}
.avg-row:last-child{border-bottom:none}
.avg-class{font-size:12px;font-weight:600;color:var(--t1);min-width:34px}
.avg-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.avg-bar{height:100%;border-radius:3px;transition:width .4s}
.avg-num{font-size:12px;font-weight:600;min-width:28px;text-align:left}
.avg-high{color:#0F6E56}.avg-mid{color:#BA7517}.avg-low{color:#993C1D}
.bar-high{background:#1D9E75}.bar-mid{background:#BA7517}.bar-low{background:#D85A30}
.sec-label{font-size:12px;font-weight:600;color:var(--t2);margin:12px 0 7px;padding-top:12px;border-top:0.5px solid var(--bd)}
.empty-msg{font-size:12px;color:var(--t3);padding:6px 0}
</style>
</head>
<body>
<div class="shell">

<div class="db-header">
  <span class="db-title"><i class="ti ti-school"></i>דשבורד מנהל</span>
  <div class="grade-btns" id="gf">
    <button class="gb on" data-g="all">הכל</button>
    <button class="gb" data-g="7">שכבה ז׳</button>
    <button class="gb" data-g="8">שכבה ח׳</button>
    <button class="gb" data-g="9">שכבה ט׳</button>
  </div>
</div>

<div class="legend">
  <span class="li"><span class="ld" style="background:#D85A30"></span>בוחן</span>
  <span class="li"><span class="ld" style="background:#1D9E75"></span>אירוע</span>
  <span class="li"><span class="ld" style="background:#BA7517"></span>חג</span>
  <span class="li"><span class="ld" style="background:#378ADD"></span>טיול</span>
  <span class="li"><span class="ld" style="background:#7F77DD"></span>יום הולדת צוות</span>
</div>

<div class="panels">
  <div class="panel">
    <div class="panel-title"><i class="ti ti-calendar"></i>לוח שנה מאוחד</div>
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cprev">›</button>
      <span class="cal-nav-label" id="cml"></span>
      <button class="cal-nav-btn" id="cnext">‹</button>
    </div>
    <div class="cal-grid" id="cgrid"></div>
    <div class="sec-label">אירועים קרובים</div>
    <div class="tl" id="upcoming"></div>
  </div>

  <div class="panel">
    <div class="panel-title"><i class="ti ti-chart-bar"></i>מעקב ציונים — משו"ב</div>
    <div class="gs-controls">
      <select id="examSel">
        <option value="math">מתמטיקה</option>
        <option value="bible">תנ״ך</option>
        <option value="english">אנגלית</option>
        <option value="science">מדעים</option>
        <option value="history">היסטוריה</option>
      </select>
      <input type="date" id="df" value="2026-04-01">
      <input type="date" id="dt" value="2026-05-31">
    </div>
    <div id="avgRows"></div>
    <div class="sec-label">מבחנים אחרונים</div>
    <div class="tl" id="recentExams"></div>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@hebcal/core@5.8.4/dist/bundle.js"></script>
<script>
const TODAY=new Date(2026,4,14);
const MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const DAYS=["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];

const HEB_MONTHS=["ניסן","אייר","סיון","תמוז","אב","אלול","תשרי","חשון","כסלו","טבת","שבט","אדר","אדר א׳","אדר ב׳"];
const HEB_NUMS=["","א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ז׳","ח׳","ט׳","י׳","י״א","י״ב","י״ג","י״ד","ט״ו","ט״ז","י״ז","י״ח","י״ט","כ׳","כ״א","כ״ב","כ״ג","כ״ד","כ״ה","כ״ו","כ״ז","כ״ח","כ״ט","ל׳"];

function toHebrewDate(date) {
  try {
    if(window.Hebcal && window.Hebcal.HDate) {
      const hd = new window.Hebcal.HDate(date);
      const day = hd.getDate();
      const month = hd.getMonthName('he');
      return HEB_NUMS[day] + " " + month;
    }
  } catch(e){}
  return hebrewDateFallback(date);
}

function hebrewDateFallback(date) {
  const jd = gregorianToJD(date.getFullYear(), date.getMonth()+1, date.getDate());
  const heb = jdToHebrew(jd);
  return HEB_NUMS[heb.day] + " " + hebrewMonthName(heb.month, heb.year);
}

function gregorianToJD(y,m,d){
  if(m<=2){y--;m+=12}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5;
}

function jdToHebrew(jd){
  const jd0=Math.floor(jd)+0.5;
  let year=Math.floor((jd0-347996.5)/365.25)+1;
  while(hebrewYearStart(year+1)<=jd0) year++;
  while(hebrewYearStart(year)>jd0) year--;
  let month=1,monthStart=hebrewYearStart(year);
  const monthLengths=getHebrewMonthLengths(year);
  for(let m=1;m<=monthLengths.length;m++){
    if(monthStart+monthLengths[m-1]>jd0){month=m;break}
    monthStart+=monthLengths[m-1];
  }
  const day=Math.floor(jd0-monthStart)+1;
  return{year,month,day};
}

function hebrewYearStart(year){
  const months=(235*year-234)/19,parts=Math.floor(months)*25920+204;
  let day=Math.floor(months)*29+Math.floor(parts/25920)+1;
  const p=parts%25920,weekday=day%7;
  if([0,3,5].includes(weekday)||(weekday===2&&p>=9924&&!isLeapYear(year))||(weekday===1&&p>=16789&&isLeapYear(year-1)))day++;
  if([0,3,5].includes(day%7))day++;
  return day+347996.5-1;
}

function isLeapYear(y){return((7*y)+1)%19<7}

function getHebrewMonthLengths(year){
  const leap=isLeapYear(year);
  const yearDays=Math.round(hebrewYearStart(year+1)-hebrewYearStart(year));
  let lengths=[30,29,30,29,30,29,30,29,30,29,30,29];
  if(leap)lengths.splice(12,0,30);
  if(yearDays===353||yearDays===383)lengths[2]=29;
  if(yearDays===355||yearDays===385)lengths[1]=30;
  return lengths;
}

function hebrewMonthName(m,year){
  const leap=isLeapYear(year);
  const names=leap?["ניסן","אייר","סיון","תמוז","אב","אלול","תשרי","חשון","כסלו","טבת","שבט","אדר א׳","אדר ב׳"]:["ניסן","אייר","סיון","תמוז","אב","אלול","תשרי","חשון","כסלו","טבת","שבט","אדר"];
  return names[(m-1)%names.length]||"";
}

const events=[
  {d:new Date(2026,4,14),title:"בוחן מתמטיקה",type:"exam",grades:[7]},
  {d:new Date(2026,4,14),title:"אסיפת הורים ז׳",type:"event",grades:[7]},
  {d:new Date(2026,4,15),title:"טיול שנתי ח׳",type:"trip",grades:[8]},
  {d:new Date(2026,4,17),title:"יום הולדת — מרים לוי",type:"bday",grades:[7,8,9]},
  {d:new Date(2026,4,18),title:"בוחן תנ״ך",type:"exam",grades:[8]},
  {d:new Date(2026,4,19),title:"יום ירושלים",type:"holiday",grades:[7,8,9]},
  {d:new Date(2026,4,20),title:"בוחן אנגלית ט׳",type:"exam",grades:[9]},
  {d:new Date(2026,4,21),title:"ערב שבועות",type:"holiday",grades:[7,8,9]},
  {d:new Date(2026,4,22),title:"חג שבועות",type:"holiday",grades:[7,8,9]},
  {d:new Date(2026,4,25),title:"בוחן מדעים ז׳",type:"exam",grades:[7]},
  {d:new Date(2026,4,26),title:"פעילות סיום שנה ט׳",type:"event",grades:[9]},
  {d:new Date(2026,4,27),title:"בוחן היסטוריה ח׳",type:"exam",grades:[8]},
  {d:new Date(2026,4,28),title:"יום ספורט",type:"event",grades:[7,8,9]},
];

const gradesData={
  math:{data:{7:[{c:"ז׳1",avg:78,date:"2026-04-10"},{c:"ז׳2",avg:84,date:"2026-04-10"},{c:"ז׳3",avg:71,date:"2026-04-10"},{c:"ז׳4",avg:88,date:"2026-04-10"}],8:[],9:[]}},
  bible:{data:{7:[],8:[{c:"ח׳1",avg:82,date:"2026-04-28"},{c:"ח׳2",avg:75,date:"2026-04-28"},{c:"ח׳3",avg:90,date:"2026-04-28"}],9:[]}},
  english:{data:{7:[],8:[],9:[{c:"ט׳1",avg:91,date:"2026-04-22"},{c:"ט׳2",avg:86,date:"2026-04-22"},{c:"ט׳3",avg:77,date:"2026-04-22"},{c:"ט׳4",avg:83,date:"2026-04-22"}]}},
  science:{data:{7:[{c:"ז׳1",avg:69,date:"2026-04-15"},{c:"ז׳2",avg:74,date:"2026-04-15"},{c:"ז׳3",avg:80,date:"2026-04-15"}],8:[],9:[]}},
  history:{data:{7:[],8:[{c:"ח׳1",avg:77,date:"2026-04-20"},{c:"ח׳2",avg:81,date:"2026-04-20"}],9:[]}},
};

let activeGrade="all",calY=TODAY.getFullYear(),calM=TODAY.getMonth();

function sd(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function gm(g,f){return f==="all"||g.includes(parseInt(f))}
function fev(){return events.filter(e=>gm(e.grades,activeGrade))}
function tc(t){return{exam:"exam",event:"event",holiday:"holiday",trip:"trip",bday:"bday"}[t]||"event"}
function ecc(t){return{exam:"ec-x",event:"ec-e",holiday:"ec-h",trip:"ec-t",bday:"ec-b"}[t]||"ec-e"}
function gl(g){if(g.length>=3)return"כלל";const m={7:"ז׳",8:"ח׳",9:"ט׳"};return g.map(x=>m[x]).join(",")}

function renderCal(){
  document.getElementById("cml").textContent=MONTHS[calM]+" "+calY;
  const first=new Date(calY,calM,1),dim=new Date(calY,calM+1,0).getDate(),evs=fev();
  let h=DAYS.map(d=>`<div class="cal-dh">${d}</div>`).join("");
  for(let i=0;i<first.getDay();i++)h+='<div class="cal-cell em"></div>';
  for(let d=1;d<=dim;d++){
    const cd=new Date(calY,calM,d),isT=sd(cd,TODAY),isSh=cd.getDay()===6,de=evs.filter(e=>sd(e.d,cd));
    const hebStr=hebrewDateFallback(cd);
    h+=`<div class="cal-cell${isT?" ct":""}${isSh?" sh":""}">
      <div class="cal-dn">${d}</div>
      <div class="cal-hd">${hebStr}</div>`;
    de.slice(0,1).forEach(e=>{h+=`<span class="ec ${ecc(e.type)}">${e.title}</span>`});
    if(de.length>1)h+=`<span class="more-c">+${de.length-1}</span>`;
    h+='</div>';
  }
  document.getElementById("cgrid").innerHTML=h;
}

function renderUpcoming(){
  const now=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
  const evs=fev().filter(e=>e.d>=now).sort((a,b)=>a.d-b.d).slice(0,7);
  document.getElementById("upcoming").innerHTML=evs.length?evs.map(e=>{
    const ds=`${e.d.getDate()} ${MONTHS[e.d.getMonth()]}`;
    return `<div class="tl-row ${tc(e.type)}"><span class="tl-title">${e.title}</span><span class="tl-grade">${gl(e.grades)}</span><span class="tl-date">${ds}</span></div>`;
  }).join(""):'<div class="empty-msg">אין אירועים קרובים</div>';
}

function renderGrades(){
  const subj=document.getElementById("examSel").value;
  const df=document.getElementById("df").value,dt=document.getElementById("dt").value;
  const grades=activeGrade==="all"?[7,8,9]:[parseInt(activeGrade)];
  let rows=[];
  grades.forEach(g=>{(gradesData[subj].data[g]||[]).forEach(r=>{if(r.date>=df&&r.date<=dt)rows.push(r)})});
  document.getElementById("avgRows").innerHTML=rows.length?rows.map(r=>{
    const col=r.avg>=85?"avg-high":r.avg>=70?"avg-mid":"avg-low";
    const bcol=r.avg>=85?"bar-high":r.avg>=70?"bar-mid":"bar-low";
    return `<div class="avg-row"><span class="avg-class">${r.c}</span><div class="avg-bar-wrap"><div class="avg-bar ${bcol}" style="width:${r.avg}%"></div></div><span class="avg-num ${col}">${r.avg}</span></div>`;
  }).join(""):'<div class="empty-msg">אין ציונים בטווח זה</div>';
}

function renderRecentExams(){
  const now=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
  const past=fev().filter(e=>e.type==="exam"&&e.d<now).sort((a,b)=>b.d-a.d).slice(0,5);
  document.getElementById("recentExams").innerHTML=past.length?past.map(e=>{
    const ds=`${e.d.getDate()} ${MONTHS[e.d.getMonth()]}`;
    return `<div class="tl-row exam"><span class="tl-title">${e.title}</span><span class="tl-grade">${gl(e.grades)}</span><span class="tl-date">${ds}</span></div>`;
  }).join(""):'<div class="empty-msg">אין מבחנים אחרונים</div>';
}

function render(){renderCal();renderUpcoming();renderGrades();renderRecentExams()}

document.getElementById("gf").addEventListener("click",e=>{
  const b=e.target.closest(".gb");if(!b)return;
  activeGrade=b.dataset.g;
  document.querySelectorAll(".gb").forEach(x=>x.classList.toggle("on",x===b));
  render();
});
document.getElementById("cprev").onclick=()=>{calM--;if(calM<0){calM=11;calY--}render()};
document.getElementById("cnext").onclick=()=>{calM++;if(calM>11){calM=0;calY++}render()};
document.getElementById("examSel").addEventListener("change",()=>{renderGrades();renderRecentExams()});
document.getElementById("df").addEventListener("change",renderGrades);
document.getElementById("dt").addEventListener("change",renderGrades);

render();
</script>
</body>
</html>
